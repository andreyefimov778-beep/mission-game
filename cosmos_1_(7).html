<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Интерактивная Карта Космоса</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:ital,wght@0,300;0,400;0,600;1,300&display=swap');

  :root {
    --star-color: #ffffff;
    --accent: #4fc3f7;
    --accent2: #ff6b6b;
    --gold: #ffd54f;
    --panel-bg: rgba(5, 10, 30, 0.92);
    --panel-border: rgba(79, 195, 247, 0.4);
    --text: #e0f4ff;
    --dim: rgba(255,255,255,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000008;
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    cursor: default;
    user-select: none;
  }

  /* ===== STARFIELD ===== */
  #starfield {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  /* ===== NEBULA BACKGROUND ===== */
  .nebula {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 60% 40% at 20% 50%, rgba(30,0,80,0.35) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 80% 30%, rgba(0,40,80,0.3) 0%, transparent 70%),
      radial-gradient(ellipse 50% 30% at 60% 80%, rgba(80,0,30,0.2) 0%, transparent 70%);
  }

  /* ===== MAIN LAYOUT ===== */
  #app {
    position: relative;
    z-index: 1;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ===== CONSTELLATION PANEL (LEFT) ===== */
  #constellation-panel {
    position: fixed;
    left: 0; top: 0;
    width: 220px;
    height: 100vh;
    z-index: 10;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 20px 10px;
    background: linear-gradient(to right, rgba(0,5,20,0.85) 80%, transparent);
    scrollbar-width: thin;
    scrollbar-color: var(--accent) transparent;
  }
  #constellation-panel::-webkit-scrollbar { width: 4px; }
  #constellation-panel::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

  .panel-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 14px;
    padding-left: 4px;
    opacity: 0.8;
  }

  .constellation-item {
    position: relative;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .constellation-svg {
    display: block;
    width: 70px;
    height: 50px;
    margin-bottom: 2px;
    transition: filter 0.2s;
  }

  .constellation-item:hover .constellation-svg {
    filter: drop-shadow(0 0 6px var(--accent2));
  }

  .constellation-name {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 1px;
    transition: color 0.2s;
    padding-left: 2px;
  }
  .constellation-item:hover .constellation-name { color: var(--text); }

  /* ===== SOLAR SYSTEM CANVAS ===== */
  #solar-canvas {
    position: absolute;
    top: 0;
    left: 220px;
    cursor: crosshair;
  }

  /* ===== TOOLTIP ===== */
  #tooltip {
    position: fixed;
    pointer-events: none;
    z-index: 100;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    padding: 10px 14px;
    max-width: 220px;
    opacity: 0;
    transition: opacity 0.2s;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 20px rgba(79,195,247,0.2);
  }
  #tooltip.visible { opacity: 1; }
  #tooltip h3 {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    color: var(--gold);
    margin-bottom: 6px;
    letter-spacing: 1px;
  }
  #tooltip p {
    font-size: 11px;
    color: var(--dim);
    line-height: 1.5;
  }

  /* ===== INFO PANEL (modal) ===== */
  #info-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 200;
    background: rgba(0,0,10,0.7);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
  }
  #info-overlay.open { display: flex; }

  #info-panel {
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    width: 700px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    padding: 36px;
    position: relative;
    box-shadow: 0 0 60px rgba(79,195,247,0.15), 0 0 120px rgba(79,195,247,0.05);
    animation: panelIn 0.3s ease;
  }

  @keyframes panelIn {
    from { opacity: 0; transform: scale(0.9) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  #info-panel .close-btn {
    position: absolute;
    top: 16px; right: 20px;
    background: none;
    border: 1px solid var(--panel-border);
    color: var(--dim);
    font-size: 18px;
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  #info-panel .close-btn:hover { color: var(--text); border-color: var(--accent); }

  #info-panel h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    color: var(--gold);
    margin-bottom: 6px;
    letter-spacing: 2px;
  }
  #info-panel .subtitle {
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 24px;
    opacity: 0.7;
  }

  .info-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  .info-stats {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid rgba(79,195,247,0.1);
    padding-bottom: 8px;
  }
  .stat-label {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 1px;
  }
  .stat-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    color: var(--accent);
  }

  .info-desc {
    font-size: 13px;
    line-height: 1.8;
    color: rgba(224,244,255,0.8);
  }

  .creature-section {
    margin-top: 24px;
    border-top: 1px solid var(--panel-border);
    padding-top: 20px;
  }
  .creature-section h3 {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    color: var(--accent2);
    letter-spacing: 2px;
    margin-bottom: 14px;
  }
  .creature-placeholder {
    display: flex;
    gap: 16px;
    align-items: center;
    background: rgba(255,107,107,0.05);
    border: 1px dashed rgba(255,107,107,0.2);
    border-radius: 10px;
    padding: 16px;
  }
  .creature-img-placeholder {
    width: 100px;
    height: 100px;
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    border: 1px dashed var(--dim);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 10px;
    color: var(--dim);
    text-align: center;
    letter-spacing: 1px;
  }
  .creature-desc-placeholder {
    font-size: 12px;
    color: var(--dim);
    line-height: 1.7;
    font-style: italic;
  }

  /* ===== LEGEND ===== */
  #legend {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 10;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 11px;
    backdrop-filter: blur(8px);
  }
  #legend .leg-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .leg-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    color: var(--dim);
  }
  .leg-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ===== HEADER ===== */
  #header {
    position: fixed;
    top: 0;
    left: 160px;
    right: 0;
    z-index: 5;
    padding: 16px 30px;
    display: flex;
    align-items: center;
    gap: 20px;
    background: linear-gradient(to bottom, rgba(0,0,10,0.6) 0%, transparent 100%);
    pointer-events: none;
  }
  #header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    letter-spacing: 4px;
    color: var(--text);
    opacity: 0.6;
    font-weight: 400;
  }

  /* scrollbar for info panel */
  #info-panel::-webkit-scrollbar { width: 4px; }
  #info-panel::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

  .planet-glow {
    filter: drop-shadow(0 0 8px currentColor);
  }

  /* Zoom hint */
  #zoom-hint {
    position: fixed;
    bottom: 20px;
    left: 180px;
    z-index: 5;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 1px;
    opacity: 0.5;
  }
</style>
</head>
<body>

// STARFIELD

(function() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = [];
    for (let i = 0; i < 700; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.4,
        a: Math.random(),
        speed: 0.003 + Math.random() * 0.005
      });
    }
  }
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.a += s.speed;
      const alpha = 0.3 + 0.7 * Math.abs(Math.sin(s.a));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', resize);
  resize();
  draw();
})();

// Star colors for constellations
const STAR_COLORS = ['#fff', '#ffe4b5', '#add8e6', '#ffd700', '#ff9999'];

// ===========================
// SOLAR SYSTEM CANVAS
// ===========================
const canvas = document.getElementById('solar-canvas');
const ctx = canvas.getContext('2d');

let W, H, cx, cy;
let scale = 1;
let offsetX = 0, offsetY = 0;
let isDragging = false;
let dragStart = { x: 0, y: 0 };
let dragOffset = { x: 0, y: 0 };

function resize() {
  const leftPanel = 220;
  W = window.innerWidth - leftPanel;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  canvas.style.left = leftPanel + 'px';
  canvas.style.top = '0px';
  canvas.style.position = 'absolute';
  cx = W / 2;
  cy = H / 2;
}
resize();
window.addEventListener('resize', resize);

// ===========================
// PLANET ANIMATION
// ===========================
let time = 0;

// Update angles
function updateAngles(dt) {
  PLANETS.forEach(p => {
    p.angle += p.speed * dt;
    if (p.moons) p.moons.forEach(m => { m.angle += m.speed * dt; });
  });
  DWARF_PLANETS.forEach(p => { p.angle += p.speed * dt; });
  COMETS.forEach(c => { c.angle += c.speed * dt; });
}

function worldToScreen(wx, wy) {
  return {
    x: (wx + offsetX) * scale + cx,
    y: (wy + offsetY) * scale + cy
  };
}

function drawSun() {
  const s = worldToScreen(0, 0);
  // Outer glow
  const grad3 = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, 80 * scale);
  grad3.addColorStop(0, 'rgba(255,200,50,0.15)');
  grad3.addColorStop(1, 'rgba(255,150,0,0)');
  ctx.beginPath();
  ctx.arc(s.x, s.y, 80 * scale, 0, Math.PI * 2);
  ctx.fillStyle = grad3;
  ctx.fill();

  // Corona
  const grad2 = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, 38 * scale);
  grad2.addColorStop(0, 'rgba(255,240,150,0.4)');
  grad2.addColorStop(1, 'rgba(255,150,0,0)');
  ctx.beginPath();
  ctx.arc(s.x, s.y, 38 * scale, 0, Math.PI * 2);
  ctx.fillStyle = grad2;
  ctx.fill();

  // Sun body
  const grad = ctx.createRadialGradient(s.x - 8 * scale, s.y - 8 * scale, 0, s.x, s.y, 22 * scale);
  grad.addColorStop(0, '#fff9c4');
  grad.addColorStop(0.4, '#ffca28');
  grad.addColorStop(1, '#e65100');
  ctx.beginPath();
  ctx.arc(s.x, s.y, 22 * scale, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
}

function drawOrbit(orbitRadius, dashed = false) {
  const s = worldToScreen(0, 0);
  ctx.beginPath();
  ctx.arc(s.x, s.y, orbitRadius * scale, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth = dashed ? 1 : 0.5;
  if (dashed) ctx.setLineDash([4, 8]);
  else ctx.setLineDash([]);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawAsteroidBelt(innerR, outerR, count, color, alpha) {
  const s = worldToScreen(0, 0);
  ctx.save();
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2 + time * 0.00001;
    const r = (innerR + Math.random() * (outerR - innerR)) * scale;
    const x = s.x + Math.cos(angle) * r;
    const y = s.y + Math.sin(angle) * r;
    const size = (0.5 + Math.random() * 1.5) * scale;
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.globalAlpha = alpha;
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// Seed-based asteroid belt (precomputed positions)
let asteroidsBelt = [];
let kuiperBelt = [];
function initBelts() {
  for (let i = 0; i < 600; i++) {
    asteroidsBelt.push({
      angle: Math.random() * Math.PI * 2,
      r: 240 + Math.random() * 40,
      size: 0.5 + Math.random() * 1.2,
      speed: (0.00005 + Math.random() * 0.00005) * (Math.random() < 0.5 ? 1 : -1) * 0.2
    });
  }
  for (let i = 0; i < 800; i++) {
    kuiperBelt.push({
      angle: Math.random() * Math.PI * 2,
      r: 735 + Math.random() * 80,
      size: 0.4 + Math.random() * 1,
      speed: (0.000005 + Math.random() * 0.000005) * 0.2
    });
  }
}
initBelts();

function drawBelt(belt, color, alpha) {
  const s = worldToScreen(0, 0);
  belt.forEach(a => {
    a.angle += a.speed;
    const x = s.x + Math.cos(a.angle) * a.r * scale;
    const y = s.y + Math.sin(a.angle) * a.r * scale;
    ctx.beginPath();
    ctx.arc(x, y, a.size * scale, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.globalAlpha = alpha;
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawPlanet(obj) {
  const wx = Math.cos(obj.angle) * obj.orbitRadius;
  const wy = Math.sin(obj.angle) * obj.orbitRadius;
  const s = worldToScreen(wx, wy);
  const r = obj.radius * scale;

  // Rings
  if (obj.rings) {
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.scale(1, 0.3);
    const ringGrad = ctx.createRadialGradient(0, 0, obj.rings.innerR * scale, 0, 0, obj.rings.outerR * scale);
    ringGrad.addColorStop(0, obj.rings.color.replace('0.25', '0.5').replace('0.15','0.4'));
    ringGrad.addColorStop(0.5, obj.rings.color);
    ringGrad.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(0, 0, obj.rings.outerR * scale, 0, Math.PI * 2);
    ctx.fillStyle = ringGrad;
    ctx.fill();
    ctx.restore();
  }

  // Glow
  const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, r * 2.5);
  glow.addColorStop(0, obj.glowColor + '55');
  glow.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(s.x, s.y, r * 2.5, 0, Math.PI * 2);
  ctx.fillStyle = glow;
  ctx.fill();

  // Planet body
  const grad = ctx.createRadialGradient(s.x - r * 0.3, s.y - r * 0.3, 0, s.x, s.y, r);
  grad.addColorStop(0, lighten(obj.color));
  grad.addColorStop(1, darken(obj.color));
  ctx.beginPath();
  ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Moons
  if (obj.moons) {
    obj.moons.forEach(m => {
      const mx = s.x + Math.cos(m.angle) * m.orbitR * scale;
      const my = s.y + Math.sin(m.angle) * m.orbitR * scale;
      ctx.beginPath();
      ctx.arc(mx, my, m.r * scale, 0, Math.PI * 2);
      ctx.fillStyle = m.color;
      ctx.fill();
    });
  }

  // Label (only when scale > 0.5)
  if (scale > 0.4) {
    ctx.fillStyle = 'rgba(200,220,255,0.7)';
    ctx.font = `${Math.max(9, 10 * scale)}px 'Exo 2', sans-serif`;
    ctx.fillText(obj.name, s.x + r + 4, s.y + 4);
  }

  return { x: s.x, y: s.y, r };
}

function drawComet(comet) {
  const wx = Math.cos(comet.angle) * comet.orbitRadius;
  const wy = Math.sin(comet.angle) * comet.orbitRadius;
  const s = worldToScreen(wx, wy);

  // Tail
  const tailLen = 30 * scale;
  const tailAngle = comet.angle + Math.PI + comet.tailAngle;
  const tailGrad = ctx.createLinearGradient(
    s.x, s.y,
    s.x + Math.cos(tailAngle) * tailLen,
    s.y + Math.sin(tailAngle) * tailLen
  );
  tailGrad.addColorStop(0, 'rgba(150,220,255,0.6)');
  tailGrad.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.moveTo(s.x, s.y);
  ctx.lineTo(s.x + Math.cos(tailAngle) * tailLen, s.y + Math.sin(tailAngle) * tailLen);
  ctx.strokeStyle = tailGrad;
  ctx.lineWidth = 2 * scale;
  ctx.stroke();

  // Core
  ctx.beginPath();
  ctx.arc(s.x, s.y, 3 * scale, 0, Math.PI * 2);
  ctx.fillStyle = '#e0f7ff';
  ctx.fill();

  if (scale > 0.4) {
    ctx.fillStyle = 'rgba(150,220,255,0.7)';
    ctx.font = `${Math.max(8, 9 * scale)}px 'Exo 2', sans-serif`;
    ctx.fillText('☄ ' + comet.name, s.x + 6, s.y - 4);
  }

  return { x: s.x, y: s.y, r: 6 * scale };
}

function drawInterstellar(obj) {
  const wx = Math.cos(obj.angle) * obj.orbitRadius;
  const wy = Math.sin(obj.angle) * obj.orbitRadius;
  const s = worldToScreen(wx, wy);

  const sz = Math.max(6, 10 * scale);

  ctx.save();
  ctx.translate(s.x, s.y);

  // Rotate to travel direction
  const travelAngle = obj.angle + Math.PI * 0.15;
  ctx.rotate(travelAngle);

  // Glow aura
  const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, sz * 3);
  glow.addColorStop(0, obj.glowColor + '55');
  glow.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(0, 0, sz * 3, 0, Math.PI * 2);
  ctx.fillStyle = glow;
  ctx.fill();

  // Trail / wake
  const trailLen = sz * 5;
  const trailGrad = ctx.createLinearGradient(0, 0, 0, trailLen);
  trailGrad.addColorStop(0, obj.glowColor + '99');
  trailGrad.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.moveTo(-sz * 0.4, 0);
  ctx.lineTo(sz * 0.4, 0);
  ctx.lineTo(0, trailLen);
  ctx.closePath();
  ctx.fillStyle = trailGrad;
  ctx.fill();

  // Ship body — elongated asteroid-like shape
  ctx.beginPath();
  ctx.save();
  ctx.scale(1, 2.8); // elongate vertically = cigar shape
  const bodyGrad = ctx.createRadialGradient(-sz * 0.2, -sz * 0.3, 0, 0, 0, sz);
  bodyGrad.addColorStop(0, '#ffffff');
  bodyGrad.addColorStop(0.3, obj.color);
  bodyGrad.addColorStop(1, darken(obj.color));
  ctx.beginPath();
  ctx.ellipse(0, 0, sz * 0.45, sz * 0.45, 0, 0, Math.PI * 2);
  ctx.fillStyle = bodyGrad;
  ctx.fill();
  // Rocky surface bumps
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 0.5;
  ctx.stroke();
  ctx.restore();

  // Surface detail lines (like rock cracks)
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = Math.max(0.5, 0.8 * scale);
  ctx.beginPath();
  ctx.moveTo(-sz * 0.2, -sz * 0.6);
  ctx.lineTo(sz * 0.1, sz * 0.2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(sz * 0.15, -sz * 0.4);
  ctx.lineTo(-sz * 0.05, sz * 0.5);
  ctx.stroke();

  ctx.restore();

  // Label
  if (scale > 0.3) {
    ctx.save();
    ctx.font = `bold ${Math.max(8, 9 * scale)}px 'Exo 2', sans-serif`;
    ctx.fillStyle = obj.color;
    ctx.textAlign = 'left';
    ctx.shadowColor = obj.glowColor;
    ctx.shadowBlur = 6;
    ctx.fillText('🛸 ' + obj.name, s.x + sz + 4, s.y - 4);
    ctx.restore();
  }

  return { x: s.x, y: s.y, r: Math.max(10, sz * 1.5) };
}


// ===========================
// DRAW JUGGERNAUT
// ===========================
function drawJuggernaut(earthScreenX, earthScreenY) {
  // Update angle
  JUGGERNAUT.angle += JUGGERNAUT.speed;

  // Position relative to Earth screen pos
  const mx = earthScreenX + Math.cos(JUGGERNAUT.angle) * JUGGERNAUT.orbitR * scale;
  const my = earthScreenY + Math.sin(JUGGERNAUT.angle) * JUGGERNAUT.orbitR * scale;

  const sz = Math.max(5, 9 * scale);

  ctx.save();
  ctx.translate(mx, my);

  // Glow aura — eerie dark teal/green
  const aura = ctx.createRadialGradient(0, 0, 0, 0, 0, sz * 4);
  aura.addColorStop(0, 'rgba(30,180,120,0.35)');
  aura.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(0, 0, sz * 4, 0, Math.PI * 2);
  ctx.fillStyle = aura;
  ctx.fill();

  // Draw horseshoe / crescent ship shape
  const r = sz * 1.1;
  const thickness = sz * 0.55;

  // Outer arc (horseshoe opening downward)
  ctx.beginPath();
  ctx.arc(0, 0, r + thickness, Math.PI * 0.15, Math.PI * 0.85, false);
  ctx.arc(0, 0, r - thickness, Math.PI * 0.85, Math.PI * 0.15, true);
  ctx.closePath();

  const bodyGrad = ctx.createRadialGradient(-sz * 0.3, -sz * 0.3, 0, 0, 0, r + thickness);
  bodyGrad.addColorStop(0, '#4a6a5a');
  bodyGrad.addColorStop(0.5, '#2a4040');
  bodyGrad.addColorStop(1, '#0d1a1a');
  ctx.fillStyle = bodyGrad;
  ctx.fill();

  // Bio-surface ridge lines
  ctx.strokeStyle = 'rgba(60,200,140,0.4)';
  ctx.lineWidth = Math.max(0.5, 0.7 * scale);
  for (let i = 0; i < 3; i++) {
    const rr = (r - thickness * 0.6) + (thickness * 0.4 * i);
    ctx.beginPath();
    ctx.arc(0, 0, rr, Math.PI * 0.18, Math.PI * 0.82, false);
    ctx.stroke();
  }

  // Engine glow at tips
  [Math.PI * 0.15, Math.PI * 0.85].forEach(a => {
    const tx = Math.cos(a) * r;
    const ty = Math.sin(a) * r;
    const eg = ctx.createRadialGradient(tx, ty, 0, tx, ty, sz * 0.8);
    eg.addColorStop(0, 'rgba(80,255,180,0.9)');
    eg.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(tx, ty, sz * 0.8, 0, Math.PI * 2);
    ctx.fillStyle = eg;
    ctx.fill();
  });

  // Outer edge highlight
  ctx.beginPath();
  ctx.arc(0, 0, r + thickness, Math.PI * 0.15, Math.PI * 0.85, false);
  ctx.strokeStyle = 'rgba(60,200,140,0.6)';
  ctx.lineWidth = Math.max(0.8, 1 * scale);
  ctx.stroke();

  ctx.restore();

  // Label
  if (scale > 0.4) {
    ctx.save();
    ctx.font = `bold ${Math.max(7, 8 * scale)}px 'Exo 2', sans-serif`;
    ctx.fillStyle = 'rgba(60,220,150,0.9)';
    ctx.textAlign = 'left';
    ctx.shadowColor = '#00ff88';
    ctx.shadowBlur = 5;
    ctx.fillText('🛸 Джаггернаут', mx + sz * 1.5 + 2, my - 2);
    ctx.restore();
  }

  return { x: mx, y: my, r: Math.max(10, sz * 2) };
}

function lighten(hex) {
  return hex; // simplified
}
function darken(hex) {
  // simple darken
  try {
    let r = parseInt(hex.slice(1,3),16);
    let g = parseInt(hex.slice(3,5),16);
    let b = parseInt(hex.slice(5,7),16);
    return `rgb(${Math.max(0,r-60)},${Math.max(0,g-60)},${Math.max(0,b-60)})`;
  } catch(e) { return hex; }
}

// DRAW NIBIRU (dragon icon on elliptical orbit)
// ===========================
function drawNibiruOrbit() {
  const s0 = worldToScreen(0, 0);
  ctx.save();
  ctx.translate(s0.x, s0.y);
  ctx.rotate(NIBIRU.orbitTilt);
  ctx.beginPath();
  ctx.ellipse(0, 0, NIBIRU.semiMajor * scale, NIBIRU.semiMinor * scale, 0, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,80,0,0.2)';
  ctx.lineWidth = 1;
  ctx.setLineDash([6, 10]);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawNibiru() {
  NIBIRU.angle += NIBIRU.speed;
  // Elliptical position with tilt
  const ex = Math.cos(NIBIRU.angle) * NIBIRU.semiMajor;
  const ey = Math.sin(NIBIRU.angle) * NIBIRU.semiMinor;
  // Apply tilt rotation
  const cosT = Math.cos(NIBIRU.orbitTilt), sinT = Math.sin(NIBIRU.orbitTilt);
  const wx = ex * cosT - ey * sinT;
  const wy = ex * sinT + ey * cosT;
  const s = worldToScreen(wx, wy);

  const fs = Math.max(14, 22 * scale);
  ctx.save();
  ctx.font = `${fs}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Glow under dragon
  ctx.shadowColor = '#ff4400';
  ctx.shadowBlur = 15 * scale;
  ctx.fillStyle = '#ff6622';
  ctx.fillText('🐉', s.x, s.y);
  ctx.shadowBlur = 0;

  if (scale > 0.35) {
    ctx.font = `${Math.max(8, 9 * scale)}px 'Exo 2', sans-serif`;
    ctx.fillStyle = 'rgba(255,120,50,0.9)';
    ctx.textAlign = 'left';
    ctx.fillText('Нибиру', s.x + fs * 0.6, s.y - 2);
  }
  ctx.restore();

  return { x: s.x, y: s.y, r: Math.max(14, 18 * scale) };
}

// ===========================
// DRAW OORT CLOUD
// ===========================
let oortParticles = [];
function initOort() {
  for (let i = 0; i < 500; i++) {
    oortParticles.push({
      angle: Math.random() * Math.PI * 2,
      r: OORT_CLOUD_R + (Math.random() - 0.5) * 120,
      size: 0.3 + Math.random() * 0.8,
      speed: 0.00001 * (Math.random() < 0.5 ? 1 : -1)
    });
  }
}
initOort();

function drawOortCloud() {
  const s0 = worldToScreen(0, 0);
  // Label
  if (scale > 0.2) {
    ctx.fillStyle = 'rgba(100,140,180,0.3)';
    ctx.font = `${Math.max(7, 9 * scale)}px 'Exo 2', sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillText('Облако Оорта', s0.x + (OORT_CLOUD_R + 30) * scale, s0.y + 5);
  }
  // Ring outline
  ctx.beginPath();
  ctx.arc(s0.x, s0.y, OORT_CLOUD_R * scale, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(80,100,140,0.15)';
  ctx.lineWidth = 0.5;
  ctx.setLineDash([3, 12]);
  ctx.stroke();
  ctx.setLineDash([]);
  // Particles
  oortParticles.forEach(p => {
    p.angle += p.speed;
    const x = s0.x + Math.cos(p.angle) * p.r * scale;
    const y = s0.y + Math.sin(p.angle) * p.r * scale;
    ctx.beginPath();
    ctx.arc(x, y, p.size * scale, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(150,180,220,0.35)';
    ctx.fill();
  });
}

// ===========================
// DRAW VULCANOIDS (zone between Mercury and Sun)
// ===========================
let vulcanoids = [];
function initVulcanoids() {
  for (let i = 0; i < 80; i++) {
    vulcanoids.push({
      angle: Math.random() * Math.PI * 2,
      r: 35 + Math.random() * 28,
      size: 0.4 + Math.random() * 0.8,
      speed: 0.0003 * SPEED + Math.random() * 0.0002 * SPEED
    });
  }
}
initVulcanoids();

function drawVulcanoids() {
  const s0 = worldToScreen(0, 0);
  vulcanoids.forEach(v => {
    v.angle += v.speed;
    const x = s0.x + Math.cos(v.angle) * v.r * scale;
    const y = s0.y + Math.sin(v.angle) * v.r * scale;
    ctx.beginPath();
    ctx.arc(x, y, v.size * scale, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,180,60,0.3)';
    ctx.fill();
  });
  if (scale > 0.5) {
    ctx.fillStyle = 'rgba(255,180,60,0.25)';
    ctx.font = `${Math.max(7, 8 * scale)}px 'Exo 2', sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillText('Вулканоиды', s0.x + 35 * scale, s0.y - 10 * scale);
  }
}

// ===========================
// DRAW SCATTERED DISK label
// ===========================
function drawRegionLabels() {
  const s0 = worldToScreen(0, 0);
  ctx.textAlign = 'left';
  if (scale > 0.2) {
    ctx.fillStyle = 'rgba(180,180,180,0.22)';
    ctx.font = `${Math.max(7, 9 * scale)}px 'Exo 2', sans-serif`;
    ctx.fillText('Пояс астероидов', s0.x + 247 * scale, s0.y + 5);
    ctx.fillText('Пояс Койпера', s0.x + 738 * scale, s0.y + 5);
    ctx.fillStyle = 'rgba(150,180,220,0.2)';
    ctx.fillText('Рассеянный диск', s0.x + 840 * scale, s0.y - 20 * scale);
  }
}

// Store screen positions for hit testing
let screenObjects = [];

const SUN_DATA = {
  name: 'Солнце', nameEn: 'Sol', type: 'star',
  stats: {
    'Тип': 'Звезда (жёлтый карлик, G2V)',
    'Диаметр': '1 392 700 км',
    'Масса': '1.989 × 10³⁰ кг',
    'Возраст': '≈4.6 млрд лет',
    'Температура поверхности': '5 778 K',
    'Температура ядра': '≈15 млн K',
    'Расстояние до Земли': '149.6 млн км',
    'Период вращения': '25–35 дней'
  },
  desc: 'Солнце — звезда в центре нашей Солнечной системы, содержащая 99.86% её массы. Энергия выделяется в результате ядерного синтеза водорода в гелий в ядре. Солнечный ветер формирует гелиосферу, защищающую планеты от межзвёздного излучения.',
  creature: null
};

// Delta time based animation
let lastTime = 0;
function animLoop(ts) {
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;
  updateAngles(dt * 0.5);
  ctx.clearRect(0, 0, W, H);
  screenObjects = [];

  // Oort cloud (outermost)
  drawOortCloud();

  // Nibiru orbit
  drawNibiruOrbit();

  // Standard orbits
  PLANETS.forEach(p => drawOrbit(p.orbitRadius));
  DWARF_PLANETS.forEach(p => drawOrbit(p.orbitRadius, true));
  COMETS.forEach(c => drawOrbit(c.orbitRadius, true));

  // Region labels
  drawRegionLabels();

  // Vulcanoids
  drawVulcanoids();

  // Belts
  drawBelt(asteroidsBelt, '#aaa', 0.2);
  drawBelt(kuiperBelt, '#667', 0.18);

  // Sun
  drawSun();
  const sunS = worldToScreen(0, 0);
  screenObjects.push({ x: sunS.x, y: sunS.y, r: 28 * scale, data: SUN_DATA });

  // Planets
  let earthScreenPos = null;
  PLANETS.forEach(p => {
    const pos = drawPlanet(p);
    screenObjects.push({ x: pos.x, y: pos.y, r: Math.max(pos.r, 10), data: p });
    if (p.name === 'Земля') earthScreenPos = pos;
  });

  // Juggernaut orbits Earth
  if (earthScreenPos) {
    const jPos = drawJuggernaut(earthScreenPos.x, earthScreenPos.y);
    screenObjects.push({ x: jPos.x, y: jPos.y, r: jPos.r, data: JUGGERNAUT });
  }

  // Dwarf planets
  DWARF_PLANETS.forEach(p => {
    const pos = drawPlanet(p);
    screenObjects.push({ x: pos.x, y: pos.y, r: Math.max(pos.r, 7), data: p });
  });

  // Comets
  COMETS.forEach(c => {
    const pos = drawComet(c);
    screenObjects.push({ x: pos.x, y: pos.y, r: Math.max(pos.r, 8), data: c });
  });

  // Nibiru (drawn on top, interactive)
  const nibiruPos = drawNibiru();
  screenObjects.push({ x: nibiruPos.x, y: nibiruPos.y, r: nibiruPos.r, data: NIBIRU });

  // Interstellar objects
  INTERSTELLAR.forEach(obj => {
    obj.angle += obj.speed;
    const pos = drawInterstellar(obj);
    screenObjects.push({ x: pos.x, y: pos.y, r: pos.r, data: obj });
  });

  requestAnimationFrame(animLoop);
}
requestAnimationFrame(animLoop);

// ===========================
// TOOLTIP & CLICK
// ===========================
const tooltip = document.getElementById('tooltip');
const ttTitle = document.getElementById('tt-title');
const ttBody = document.getElementById('tt-body');

function hitTest(mouseX, mouseY) {
  for (let i = screenObjects.length - 1; i >= 0; i--) {
    const o = screenObjects[i];
    const dx = mouseX - o.x;
    const dy = mouseY - o.y;
    if (dx * dx + dy * dy < (o.r + 6) * (o.r + 6)) return o.data;
  }
  return null;
}

canvas.addEventListener('mousemove', e => {
  if (isDragging) {
    offsetX = dragOffset.x + (e.clientX - dragStart.x) / scale;
    offsetY = dragOffset.y + (e.clientY - 0 - dragStart.y) / scale;
    canvas.style.cursor = 'grabbing';
    return;
  }
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const hit = hitTest(mx, my);
  if (hit) {
    ttTitle.textContent = hit.name;
    const typeLabel = { planet: 'Планета', dwarf: 'Карликовая планета', star: 'Звезда', comet: 'Комета', interstellar: '🛸 Межзвёздный объект', juggernaut: '🛸 Инопланетный корабль' }[hit.type] || '';
    ttBody.innerHTML = `<span style="color:var(--accent);font-size:10px;letter-spacing:1px">${typeLabel}</span><br>` +
      Object.entries(hit.stats).slice(0, 3).map(([k,v]) => `${k}: <b style="color:var(--text)">${v}</b>`).join('<br>');
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
    tooltip.classList.add('visible');
    canvas.style.cursor = 'pointer';
  } else {
    tooltip.classList.remove('visible');
    canvas.style.cursor = 'crosshair';
  }
});

canvas.addEventListener('mouseleave', () => { tooltip.classList.remove('visible'); });

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const hit = hitTest(mx, my);
  if (hit) openPanel(hit);
});

// Zoom
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.08 : 0.92;
  scale = Math.max(0.15, Math.min(3, scale * factor));
}, { passive: false });

// Drag
canvas.addEventListener('mousedown', e => {
  isDragging = true;
  dragStart = { x: e.clientX, y: e.clientY - 0 };
  dragOffset = { x: offsetX, y: offsetY };
});
canvas.addEventListener('mouseup', () => { isDragging = false; canvas.style.cursor = 'crosshair'; });

// ===========================
// PANEL
// ===========================
function openPanel(data) {
  const overlay = document.getElementById('info-overlay');
  const content = document.getElementById('panel-content');

  const typeColors = { planet: '#ffd54f', dwarf: '#80cbc4', star: '#ffcc02', comet: '#4fc3f7' };
  const typeNames = { planet: 'Планета', dwarf: 'Карликовая планета', star: 'Звезда', comet: 'Комета', interstellar: 'Межзвёздный объект', special: 'Специальный объект', juggernaut: 'Инопланетный корабль' };
  const accentColor = typeColors[data.type] || '#ffd54f';

  const statsHTML = Object.entries(data.stats).map(([k,v]) => `
    <div class="stat-row">
      <span class="stat-label">${k}</span>
      <span class="stat-value">${v}</span>
    </div>
  `).join('');

  // Special photo section for Juggernaut
  const juggernautPhotos = data.type === 'juggernaut' ? `
    <div class="creature-section">
      <h3>📸 Фотоматериалы</h3>
      <div style="display:flex;flex-direction:column;gap:16px;margin-top:12px;">
        <div>
          <div style="font-size:10px;color:var(--accent);letter-spacing:2px;margin-bottom:8px;text-transform:uppercase;">Корабль «Джаггернаут»</div>
          <img src="${JUGGERNAUT_IMG}" style="width:100%;border-radius:10px;border:1px solid rgba(60,200,140,0.3);box-shadow:0 0 20px rgba(60,200,140,0.15);" />
        </div>
        <div>
          <div style="font-size:10px;color:var(--accent);letter-spacing:2px;margin-bottom:8px;text-transform:uppercase;">Пилот — Mr. Smith</div>
          <img src="${SMITH_IMG}" style="max-width:280px;border-radius:10px;border:1px solid rgba(60,200,140,0.3);box-shadow:0 0 20px rgba(60,200,140,0.15);" />
        </div>
      </div>
    </div>
  ` : '';

  const creatureSection = `
    <div class="creature-section">
      <h3>🌌 Существо созвездия</h3>
      <div class="creature-placeholder">
        <div class="creature-img-placeholder">ФОТО<br>ЗАГЛУШКА</div>
        <div class="creature-desc-placeholder">
          Здесь будет фотография и описание существа, связанного с этим объектом.<br><br>
          <em style="color:rgba(79,195,247,0.5)">[ Контент будет добавлен позже ]</em>
        </div>
      </div>
    </div>
  `;

  content.innerHTML = `
    <h2>${data.name}</h2>
    <div class="subtitle" style="color:${accentColor}">${data.nameEn || ''} · ${typeNames[data.type] || ''}</div>
    <div class="info-layout">
      <div class="info-stats">${statsHTML}</div>
      <div class="info-desc">${data.desc}</div>
    </div>
    ${data.type === 'juggernaut' ? juggernautPhotos : (data.type !== 'star' || data.creature ? creatureSection : '')}
  `;

  overlay.classList.add('open');
}

function closePanel() {
  document.getElementById('info-overlay').classList.remove('open');
}
document.getElementById('info-overlay').addEventListener('click', function(e) {
  if (e.target === this) closePanel();
});

// ===========================
// CONSTELLATIONS
// ===========================
const constList = document.getElementById('constellation-list');

CONSTELLATIONS.forEach((c, idx) => {
  const item = document.createElement('div');
  item.className = 'constellation-item';

  // Draw mini SVG
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('viewBox', '0 0 65 45');
  svg.setAttribute('class', 'constellation-svg');

  // Lines
  for (let i = 0; i < c.points.length - 1; i++) {
    const line = document.createElementNS(svgNS, 'line');
    line.setAttribute('x1', c.points[i][0]);
    line.setAttribute('y1', c.points[i][1]);
    line.setAttribute('x2', c.points[i+1][0]);
    line.setAttribute('y2', c.points[i+1][1]);
    line.setAttribute('stroke', 'rgba(150,200,255,0.4)');
    line.setAttribute('stroke-width', '0.8');
    svg.appendChild(line);
  }

  // Stars
  c.points.forEach((p, i) => {
    const starColor = STAR_COLORS[i % STAR_COLORS.length];
    const circle = document.createElementNS(svgNS, 'circle');
    circle.setAttribute('cx', p[0]);
    circle.setAttribute('cy', p[1]);
    circle.setAttribute('r', i === 0 ? 2.5 : 1.5);
    circle.setAttribute('fill', starColor);
    svg.appendChild(circle);
  });

  item.appendChild(svg);

  const nameEl = document.createElement('div');
  nameEl.className = 'constellation-name';
  nameEl.textContent = c.name;
  item.appendChild(nameEl);

  item.addEventListener('mouseenter', () => {
    svg.querySelectorAll('circle').forEach(el => {
      el.setAttribute('fill', '#ff9999');
    });
    svg.querySelectorAll('line').forEach(el => {
      el.setAttribute('stroke', 'rgba(255,150,150,0.7)');
    });
  });
  item.addEventListener('mouseleave', () => {
    svg.querySelectorAll('circle').forEach((el, i) => {
      el.setAttribute('fill', STAR_COLORS[i % STAR_COLORS.length]);
    });
    svg.querySelectorAll('line').forEach(el => {
      el.setAttribute('stroke', 'rgba(150,200,255,0.4)');
    });
  });

  item.addEventListener('click', () => openConstPanel(c));
  constList.appendChild(item);
});

function openConstPanel(c) {
  const overlay = document.getElementById('info-overlay');
  const content = document.getElementById('panel-content');

  // Draw bigger SVG for panel
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('viewBox', '0 0 65 45');
  svg.setAttribute('width', '130');
  svg.setAttribute('height', '90');
  svg.style.marginBottom = '16px';

  for (let i = 0; i < c.points.length - 1; i++) {
    const line = document.createElementNS(svgNS, 'line');
    line.setAttribute('x1', c.points[i][0]);
    line.setAttribute('y1', c.points[i][1]);
    line.setAttribute('x2', c.points[i+1][0]);
    line.setAttribute('y2', c.points[i+1][1]);
    line.setAttribute('stroke', 'rgba(150,200,255,0.5)');
    line.setAttribute('stroke-width', '0.8');
    svg.appendChild(line);
  }
  c.points.forEach((p, i) => {
    const starColor = STAR_COLORS[i % STAR_COLORS.length];
    const circle = document.createElementNS(svgNS, 'circle');
    circle.setAttribute('cx', p[0]);
    circle.setAttribute('cy', p[1]);
    circle.setAttribute('r', i === 0 ? 3 : 2);
    circle.setAttribute('fill', starColor);
    const glow = document.createElementNS(svgNS, 'circle');
    glow.setAttribute('cx', p[0]);
    glow.setAttribute('cy', p[1]);
    glow.setAttribute('r', i === 0 ? 5 : 3.5);
    glow.setAttribute('fill', starColor);
    glow.setAttribute('opacity', '0.15');
    svg.insertBefore(glow, circle);
    svg.appendChild(circle);
  });

  content.innerHTML = `
    <h2>${c.name}</h2>
    <div class="subtitle" style="color:var(--accent)">${c.latin} · Созвездие</div>
  `;
  content.appendChild(svg);

  content.innerHTML += `
    <div class="info-layout">
      <div class="info-stats">
        <div class="stat-row"><span class="stat-label">Название (лат.)</span><span class="stat-value">${c.latin}</span></div>
        <div class="stat-row"><span class="stat-label">Звёзд в паттерне</span><span class="stat-value">${c.points.length}</span></div>
        <div class="stat-row"><span class="stat-label">Тип</span><span class="stat-value">Официальное созвездие МАС</span></div>
      </div>
      <div class="info-desc">
        Созвездие <strong style="color:var(--text)">${c.name}</strong> (лат. ${c.latin}) — одно из 88 официальных созвездий, принятых Международным астрономическим союзом. Каждое созвездие занимает определённую область небесной сферы и служит ориентиром для навигации и изучения звёздного неба.
      </div>
    </div>
    <div class="creature-section">
      <h3>🐾 Существо созвездия</h3>
      <div class="creature-placeholder">
        <div class="creature-img-placeholder">ФОТО<br>ЗАГЛУШКА</div>
        <div class="creature-desc-placeholder">
          Здесь будет фотография и описание существа, которое соответствует созвездию <strong style="color:var(--text)">${c.name}</strong>.<br><br>
          <em style="color:rgba(79,195,247,0.5)">[ Контент будет добавлен позже ]</em>
        </div>
      </div>
    </div>
  `;

  overlay.classList.add('open');
}

// Keyboard close
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePanel();
});
