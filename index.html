<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>МИССИЯ НА ЗЕМЛЮ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Russo+One&family=Rajdhani:wght@400;600;700&display=swap');

:root {
  --bg: #060810;
  --bg2: #0a0d15;
  --panel: #0d1220;
  --panel2: #111828;
  --border: #1a2a3a;
  --border2: #243040;
  --accent: #00c8ff;
  --accent2: #ff6600;
  --green: #00ff88;
  --red: #ff2244;
  --yellow: #ffc800;
  --purple: #8855ff;
  --text: #a8c8d8;
  --dim: #3a5a6a;
  --glow-b: 0 0 15px rgba(0,200,255,0.4);
  --glow-o: 0 0 15px rgba(255,102,0,0.4);
  --glow-g: 0 0 15px rgba(0,255,136,0.4);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  font-family: 'Share Tech Mono', monospace;
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  cursor: default;
  user-select: none;
}

/* ===== SCANLINE EFFECT ===== */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events: none;
  z-index: 9999;
}

/* ===== HEADER ===== */
header {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: relative;
}
header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0.5;
}

.logo {
  font-family: 'Russo One', sans-serif;
  font-size: 18px;
  color: #fff;
  letter-spacing: 4px;
  text-transform: uppercase;
}
.logo span { color: var(--accent); text-shadow: var(--glow-b); }

.header-center {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 2px;
}
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: var(--glow-g);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.header-right {
  display: flex;
  align-items: center;
  gap: 20px;
}
.babki-display {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,200,0,0.08);
  border: 1px solid rgba(255,200,0,0.2);
  padding: 4px 12px;
  border-radius: 2px;
}
.babki-icon { font-size: 14px; }
.babki-label { font-size: 9px; color: var(--dim); letter-spacing: 1px; }
.babki-val {
  font-family: 'Russo One', sans-serif;
  font-size: 16px;
  color: var(--yellow);
  text-shadow: 0 0 10px rgba(255,200,0,0.5);
  transition: all 0.3s;
}
.babki-val.pop { animation: bpop 0.4s ease; }
@keyframes bpop { 0%{transform:scale(1)} 50%{transform:scale(1.3);color:#fff} 100%{transform:scale(1)} }

.btn-quiz {
  font-family: 'Russo One', sans-serif;
  font-size: 11px;
  letter-spacing: 2px;
  padding: 6px 16px;
  background: linear-gradient(135deg, rgba(0,200,255,0.15), rgba(0,200,255,0.05));
  border: 1px solid var(--accent);
  color: var(--accent);
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
}
.btn-quiz:hover {
  background: rgba(0,200,255,0.2);
  box-shadow: var(--glow-b);
  transform: translateY(-1px);
}

/* ===== MAIN LAYOUT ===== */
.main {
  display: grid;
  grid-template-columns: 230px 1fr 260px;
  flex: 1;
  overflow: hidden;
  gap: 1px;
  background: var(--border);
}

/* ===== PANELS ===== */
.panel {
  background: var(--panel);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}

.panel-hdr {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--dim);
  padding: 10px 14px 8px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  position: sticky;
  top: 0;
  background: var(--panel);
  z-index: 2;
  text-transform: uppercase;
}
.panel-hdr .dot {
  width: 5px; height: 5px;
  background: var(--accent2);
  box-shadow: var(--glow-o);
  flex-shrink: 0;
}

/* ===== SHIP VIEWER ===== */
.viewport {
  background: var(--bg2);
  position: relative;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.vp-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px 8px;
  border-bottom: 1px solid var(--border);
  background: var(--panel);
  flex-shrink: 0;
}
.vp-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--dim);
  text-transform: uppercase;
}
.vp-hull-tabs {
  display: flex;
  gap: 4px;
}
.hull-tab {
  font-family: 'Rajdhani', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 3px 10px;
  border: 1px solid var(--border2);
  color: var(--dim);
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
}
.hull-tab:hover { border-color: var(--accent); color: var(--accent); }
.hull-tab.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,200,255,0.08);
  box-shadow: var(--glow-b);
}

/* HANGAR BACKGROUND */
.hangar {
  flex: 1;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.hangar-bg {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, #060810 0%, #080c14 40%, #0a1020 100%);
}

/* Grid floor */
.hangar-grid {
  position: absolute;
  bottom: 0;
  left: 0; right: 0;
  height: 40%;
  background-image:
    linear-gradient(rgba(0,200,255,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,200,255,0.06) 1px, transparent 1px);
  background-size: 50px 50px;
  transform: perspective(300px) rotateX(60deg);
  transform-origin: bottom;
}

/* Hangar structures SVG */
.hangar-structures {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

/* SHIP DISPLAY */
.ship-display {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.ship-svg-wrap {
  position: relative;
  filter: drop-shadow(0 0 30px rgba(0,200,255,0.2));
  transition: filter 0.4s;
}
.ship-svg-wrap:hover {
  filter: drop-shadow(0 0 40px rgba(0,200,255,0.35));
}

.ship-name-plate {
  font-family: 'Russo One', sans-serif;
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--dim);
  text-transform: uppercase;
  text-align: center;
}

/* Module highlights on ship */
.module-highlight {
  position: absolute;
  border-radius: 2px;
  transition: all 0.3s;
  pointer-events: none;
}
.module-highlight.active {
  background: rgba(0,200,255,0.15);
  border: 1px solid var(--accent);
  box-shadow: var(--glow-b);
}

/* ===== STATS BAR ===== */
.stats-bar {
  background: var(--panel);
  border-top: 1px solid var(--border);
  padding: 8px 16px;
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 8px;
  flex-shrink: 0;
}
.stat-item {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.stat-lbl {
  font-size: 8px;
  color: var(--dim);
  letter-spacing: 1px;
  text-transform: uppercase;
}
.stat-bar-track {
  height: 3px;
  background: var(--border2);
  border-radius: 1px;
  overflow: hidden;
}
.stat-bar-fill {
  height: 100%;
  border-radius: 1px;
  transition: width 0.5s ease;
}
.fill-dps { background: var(--accent2); }
.fill-shield { background: var(--accent); }
.fill-armor { background: #6688aa; }
.fill-speed { background: var(--green); }
.fill-morale { background: var(--purple); }
.fill-range { background: var(--yellow); }
.stat-num {
  font-size: 9px;
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
}

/* ===== LEFT PANEL — SHOP ===== */
.shop-body { padding: 8px; }

.category-sep {
  font-family: 'Rajdhani', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--accent2);
  padding: 10px 4px 4px;
  display: flex;
  align-items: center;
  gap: 6px;
  text-transform: uppercase;
}
.category-sep::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--border2), transparent);
}

.part-card {
  background: var(--panel2);
  border: 1px solid var(--border);
  padding: 8px 10px;
  margin-bottom: 3px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.part-card:hover:not(.owned):not(.cant-afford) {
  border-color: var(--accent2);
  box-shadow: inset 0 0 20px rgba(255,102,0,0.05);
  transform: translateX(2px);
}
.part-card.owned {
  border-color: var(--green);
  background: rgba(0,255,136,0.04);
  cursor: default;
}
.part-card.cant-afford { opacity: 0.4; cursor: not-allowed; }

.part-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 3px;
}
.part-name {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 11px;
  color: #fff;
  letter-spacing: 1px;
}
.part-slot-tag {
  font-size: 8px;
  padding: 1px 5px;
  border-radius: 1px;
  letter-spacing: 1px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
}
.tag-high { background: rgba(255,102,0,0.2); color: var(--accent2); border: 1px solid rgba(255,102,0,0.3); }
.tag-mid { background: rgba(0,200,255,0.15); color: var(--accent); border: 1px solid rgba(0,200,255,0.3); }
.tag-low { background: rgba(100,120,160,0.2); color: #6688aa; border: 1px solid rgba(100,120,160,0.3); }
.tag-civ { background: rgba(136,85,255,0.15); color: var(--purple); border: 1px solid rgba(136,85,255,0.3); }

.part-desc {
  font-size: 9px;
  color: var(--dim);
  line-height: 1.4;
  margin-bottom: 5px;
}
.part-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.part-cost {
  font-size: 10px;
  color: var(--yellow);
  display: flex;
  align-items: center;
  gap: 4px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
}
.part-stats-mini {
  font-size: 8px;
  color: var(--dim);
  display: flex;
  gap: 6px;
}
.pstat { display: flex; align-items: center; gap: 2px; }
.pstat.cpu { color: #4488ff; }
.pstat.pg { color: var(--accent2); }

.owned-badge {
  font-size: 8px;
  color: var(--green);
  letter-spacing: 1px;
  font-family: 'Rajdhani', sans-serif;
}

/* ===== RIGHT PANEL — SLOTS ===== */
.slots-body { padding: 8px; }

/* CPU/PG meters */
.resource-meters {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 10px;
  background: var(--bg2);
  border: 1px solid var(--border);
  margin-bottom: 10px;
}
.res-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.res-label {
  font-size: 9px;
  color: var(--dim);
  letter-spacing: 1px;
  width: 30px;
  flex-shrink: 0;
}
.res-track {
  flex: 1;
  height: 5px;
  background: var(--border2);
  border-radius: 1px;
  overflow: hidden;
}
.res-fill {
  height: 100%;
  border-radius: 1px;
  transition: width 0.5s ease;
}
.res-fill.cpu { background: linear-gradient(90deg, #4488ff, #00ccff); }
.res-fill.pg { background: linear-gradient(90deg, var(--accent2), var(--yellow)); }
.res-fill.warning { background: var(--red) !important; }
.res-val {
  font-size: 9px;
  color: var(--text);
  width: 55px;
  text-align: right;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
  flex-shrink: 0;
}

/* Slot group */
.slot-group-lbl {
  font-family: 'Rajdhani', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 8px 4px 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.slot-group-lbl.high { color: var(--accent2); }
.slot-group-lbl.mid { color: var(--accent); }
.slot-group-lbl.low { color: #6688aa; }
.slot-group-lbl.civ { color: var(--purple); }
.slot-group-lbl::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border2);
}

.slot {
  background: var(--panel2);
  border: 1px dashed var(--border2);
  padding: 7px 10px;
  margin-bottom: 3px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  min-height: 42px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.slot:hover:not(.slot-locked) {
  border-color: var(--accent);
  background: rgba(0,200,255,0.03);
}
.slot.filled-high { border-style: solid; border-color: rgba(255,102,0,0.5); background: rgba(255,102,0,0.04); }
.slot.filled-mid { border-style: solid; border-color: rgba(0,200,255,0.5); background: rgba(0,200,255,0.04); }
.slot.filled-low { border-style: solid; border-color: rgba(100,120,160,0.5); background: rgba(100,120,160,0.04); }
.slot.filled-civ { border-style: solid; border-color: rgba(136,85,255,0.5); background: rgba(136,85,255,0.04); }
.slot.slot-locked { opacity: 0.25; cursor: not-allowed; }

.slot-icon {
  width: 24px; height: 24px;
  border-radius: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.slot-icon.empty {
  background: var(--border);
  color: var(--dim);
  font-size: 10px;
}
.slot-icon.filled-high-icon { background: rgba(255,102,0,0.15); }
.slot-icon.filled-mid-icon { background: rgba(0,200,255,0.15); }
.slot-icon.filled-low-icon { background: rgba(100,120,160,0.15); }
.slot-icon.filled-civ-icon { background: rgba(136,85,255,0.15); }

.slot-info { flex: 1; min-width: 0; }
.slot-name {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.slot-sublabel { font-size: 8px; color: var(--dim); letter-spacing: 1px; }

.slot-remove-btn {
  width: 16px; height: 16px;
  display: flex; align-items: center; justify-content: center;
  color: var(--red);
  font-size: 12px;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.15s;
  flex-shrink: 0;
  border-radius: 1px;
}
.slot:hover .slot-remove-btn { opacity: 0.7; }
.slot-remove-btn:hover { opacity: 1 !important; background: rgba(255,34,68,0.15); }

/* ===== MODALS ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.modal {
  background: var(--panel);
  border: 1px solid var(--border2);
  width: 520px;
  max-width: 95vw;
  box-shadow: 0 0 60px rgba(0,0,0,0.8), 0 0 30px rgba(0,200,255,0.1);
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }

.modal-hdr {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg2);
}
.modal-title {
  font-family: 'Russo One', sans-serif;
  font-size: 14px;
  letter-spacing: 3px;
  color: #fff;
  text-transform: uppercase;
}
.modal-close {
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  color: var(--dim);
  font-size: 16px;
  cursor: pointer;
  border: 1px solid var(--border);
  transition: all 0.15s;
}
.modal-close:hover { color: var(--red); border-color: var(--red); }

.modal-body { padding: 20px 18px; }

/* QUIZ MODAL */
.quiz-cat {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--accent2);
  text-transform: uppercase;
  margin-bottom: 6px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
}
.quiz-q {
  font-family: 'Rajdhani', sans-serif;
  font-size: 17px;
  font-weight: 600;
  color: #fff;
  line-height: 1.4;
  margin-bottom: 20px;
  min-height: 50px;
}
.quiz-reward {
  font-size: 10px;
  color: var(--dim);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.reward-val {
  color: var(--yellow);
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 13px;
}
.quiz-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.quiz-opt {
  background: var(--panel2);
  border: 1px solid var(--border2);
  padding: 12px 14px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  text-align: left;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.quiz-opt:hover:not(.disabled) {
  border-color: var(--accent);
  color: #fff;
  background: rgba(0,200,255,0.06);
}
.quiz-opt.correct {
  border-color: var(--green);
  background: rgba(0,255,136,0.1);
  color: var(--green);
}
.quiz-opt.wrong {
  border-color: var(--red);
  background: rgba(255,34,68,0.08);
  color: var(--red);
  opacity: 0.7;
}
.quiz-opt.disabled { cursor: default; pointer-events: none; }
.opt-letter {
  font-size: 10px;
  color: var(--dim);
  min-width: 14px;
  flex-shrink: 0;
  margin-top: 1px;
}
.quiz-opt.correct .opt-letter { color: var(--green); }
.quiz-opt.wrong .opt-letter { color: var(--red); }

.quiz-result {
  margin-top: 16px;
  padding: 12px 14px;
  border-radius: 1px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1px;
  display: none;
  align-items: center;
  justify-content: space-between;
}
.quiz-result.show { display: flex; }
.quiz-result.win {
  background: rgba(0,255,136,0.1);
  border: 1px solid var(--green);
  color: var(--green);
}
.quiz-result.lose {
  background: rgba(255,34,68,0.08);
  border: 1px solid var(--red);
  color: var(--red);
}
.quiz-next-btn {
  font-family: 'Russo One', sans-serif;
  font-size: 10px;
  letter-spacing: 2px;
  padding: 6px 14px;
  background: transparent;
  border: 1px solid currentColor;
  color: inherit;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
}
.quiz-next-btn:hover { background: rgba(255,255,255,0.05); }

/* SLOT SELECT MODAL */
.slot-select-list { display: flex; flex-direction: column; gap: 6px; }
.slot-select-item {
  background: var(--panel2);
  border: 1px solid var(--border);
  padding: 10px 14px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 12px;
}
.slot-select-item:hover {
  border-color: var(--accent);
  transform: translateX(4px);
}
.slot-select-item.incompatible {
  opacity: 0.35;
  cursor: not-allowed;
}
.slot-select-item.incompatible:hover { transform: none; border-color: var(--border); }
.ssi-icon { font-size: 20px; }
.ssi-info { flex: 1; }
.ssi-name {
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: #fff;
}
.ssi-reason { font-size: 9px; color: var(--dim); margin-top: 2px; }
.ssi-arrow { color: var(--accent); font-size: 14px; }

/* NOTIFICATION */
.notif {
  position: fixed;
  top: 60px;
  right: 20px;
  background: var(--panel);
  border: 1px solid var(--border2);
  padding: 10px 16px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  z-index: 2000;
  animation: notifIn 0.25s ease, notifOut 0.25s ease 2.5s forwards;
  display: flex;
  align-items: center;
  gap: 10px;
  max-width: 300px;
}
.notif.success { border-color: var(--green); }
.notif.error { border-color: var(--red); }
.notif.info { border-color: var(--accent); }
@keyframes notifIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
@keyframes notifOut { from{opacity:1} to{opacity:0;pointer-events:none} }

</style>
</head>

  { id:'armor1', name:'СТАЛЬНАЯ БРОНЯ', cat:'LOW', icon:'🔩', desc:'Базовое бронирование корпуса. Пассивная защита.', cost:600, cpu:0, pg:0, stats:{armor:25}, compat:['scout','frigate','transport'] },
  { id:'armor2', name:'НАНОБРОНЬ', cat:'LOW', icon:'⚙️', desc:'Самовосстанавливающееся покрытие. Дорого, но эффективно.', cost:3200, cpu:20, pg:10, stats:{armor:60}, compat:['frigate','transport'] },
  { id:'engine1', name:'МАРШЕВЫЙ ДВИЖОК T1', cat:'LOW', icon:'🔥', desc:'Основной двигатель. Стандартная тяга.', cost:1000, cpu:10, pg:80, stats:{speed:20, range:10}, compat:['scout','frigate','transport'] },
  { id:'engine2', name:'ФОРСАЖНЫЙ ДВИЖОК', cat:'LOW', icon:'⚡', desc:'Высокоскоростной. Большой расход топлива.', cost:2500, cpu:15, pg:140, stats:{speed:45}, compat:['scout','frigate'] },
  { id:'maneuver1', name:'МАНЕВРОВЫЕ ДЮЗЫ', cat:'LOW', icon:'🔄', desc:'Боковые двигатели. Улучшают манёвренность.', cost:800, cpu:5, pg:40, stats:{speed:15}, compat:['scout','frigate','transport'] },

  // CIVILIAN SLOTS
  { id:'lab1', name:'НАУЧНАЯ ЛАБОРАТОРИЯ', cat:'CIV', icon:'🔬', desc:'Исследования в пути. Открывает спецсценарии и +20 AU дальности.', cost:2000, cpu:0, pg:0, stats:{range:20}, compat:['scout','frigate','transport'] },
  { id:'gym1', name:'СПОРТЗАЛ', cat:'CIV', icon:'🏋️', desc:'Поддержание боеспособности экипажа. +25 к морали.', cost:800, cpu:0, pg:0, stats:{morale:25}, compat:['scout','frigate','transport'] },
  { id:'med1', name:'МЕДИЦИНСКИЙ БЛОК', cat:'CIV', icon:'🏥', desc:'Медотсек для экипажа. Открывает спецсценарии миссии.', cost:1200, cpu:0, pg:0, stats:{morale:15}, compat:['frigate','transport'] },
  { id:'garden1', name:'ОРАНЖЕРЕЯ', cat:'CIV', icon:'🌱', desc:'Автономное жизнеобеспечение. +30 AU дальности полёта.', cost:1500, cpu:0, pg:0, stats:{range:30}, compat:['transport'] },
  { id:'quarters1', name:'ЖИЛОЙ БЫТ', cat:'CIV', icon:'🛋️', desc:'Комфортное жильё для экипажа. +10 к морали.', cost:500, cpu:0, pg:0, stats:{morale:10}, compat:['scout','frigate','transport'] },
];

const QUIZ_QUESTIONS = [
  { cat:'АСТРОФИЗИКА', q:'Какова примерная масса нашего Солнца в килограммах?', opts:['2×10³⁰ кг','5×10²⁴ кг','7×10²² кг','1×10³⁵ кг'], ans:0, reward:150 },
  { cat:'ФИЗИКА', q:'Чему равна первая космическая скорость Земли?', opts:['7,9 км/с','11,2 км/с','3,5 км/с','16,7 км/с'], ans:0, reward:100 },
  { cat:'ИСТОРИЯ', q:'В каком году был запущен первый искусственный спутник Земли?', opts:['1957','1961','1969','1953'], ans:0, reward:100 },
  { cat:'ФИЗИКА', q:'Что такое "точка Лагранжа"?', opts:['Точка равновесия гравитационных сил двух тел','Центр галактики','Максимальная точка орбиты','Место рождения звезды'], ans:0, reward:200 },
  { cat:'ХИМИЯ', q:'Какой газ составляет большую часть атмосферы Земли?', opts:['Азот (N₂)','Кислород (O₂)','Аргон (Ar)','CO₂'], ans:0, reward:80 },
  { cat:'ЛОГИКА', q:'Если звездолёт летит 10 лет на скорости 0.5c, сколько времени пройдёт на Земле?', opts:['Больше 10 лет','Ровно 10 лет','Меньше 10 лет','Зависит от направления'], ans:0, reward:250 },
  { cat:'АСТРОФИЗИКА', q:'Что такое "красное смещение" в астрофизике?', opts:['Удаление объекта от наблюдателя','Приближение объекта','Изменение температуры звезды','Вспышка сверхновой'], ans:0, reward:180 },
  { cat:'ИСТОРИЯ', q:'Первый человек в открытом космосе — Алексей Леонов. В каком году?', opts:['1965','1969','1961','1972'], ans:0, reward:120 },
  { cat:'ФИЗИКА', q:'Вторая космическая скорость Земли — это скорость::', opts:['Необходимая для выхода из поля тяготения Земли','Для выхода на орбиту','Для полёта до Луны','Скорость МКС'], ans:0, reward:150 },
  { cat:'ЛОГИКА', q:'На корабле 3 турели. Каждая делает 20 выстрелов в минуту. Общий DPS за час?', opts:['3600','3000','2400','1800'], ans:0, reward:200 },
  { cat:'ГЕОГРАФИЯ', q:'Какой город является ближайшим к экватору?', opts:['Кито (Эквадор)','Найроби (Кения)','Богота (Колумбия)','Сингапур'], ans:0, reward:100 },
  { cat:'ХИМИЯ', q:'Ракетное топливо LOX/LH2 — это:', opts:['Жидкий кислород + жидкий водород','Азот + водород','Керосин + кислород','Метан + кислород'], ans:0, reward:180 },
  { cat:'ЛОГИКА', q:'Число 42 — ответ на главный вопрос вселенной. Из какой книги?', opts:['Автостопом по галактике','1984','Дюна','Основание'], ans:0, reward:120 },
  { cat:'АСТРОФИЗИКА', q:'Размер "горизонта событий" чёрной дыры зависит от:', opts:['Массы чёрной дыры','Её температуры','Расстояния от Земли','Возраста вселенной'], ans:0, reward:220 },
  { cat:'ФИЗИКА', q:'Что такое "реактивная тяга" в двигателях?', opts:['Выброс массы в одну сторону создаёт силу в другую','Горение топлива создаёт давление','Магнитное ускорение частиц','Ядерный распад'], ans:0, reward:150 },
];

// ===== STATE =====
let state = {
  babki: 5000,
  selectedHull: null,
  installedModules: {}, // slotId -> moduleId
  ownedModules: [], // purchased module ids
  quizIdx: Math.floor(Math.random() * QUIZ_QUESTIONS.length),
  quizAnswered: false,
  pendingSlot: null,
};

// ===== INIT =====
function init() {
  renderHullTabs();
  renderShop();
  selectHull(HULLS[1]); // default: frigate
}

// ===== HULL TABS =====
function renderHullTabs() {
  const cont = document.getElementById('hull-tabs');
  cont.innerHTML = HULLS.map(h => `
    <div class="hull-tab ${state.selectedHull?.id === h.id ? 'active' : ''}" onclick="selectHull(HULLS.find(x=>x.id==='${h.id}'))">${h.name}</div>
  `).join('');
}

function selectHull(hull) {
  if (state.selectedHull?.id === hull.id) return;
  state.selectedHull = hull;
  state.installedModules = {};
  renderHullTabs();
  renderShipSVG();
  renderSlots();
  recalcStats();
  showNotif(`Корпус "${hull.name}" выбран`, 'info');
}

// ===== SHIP SVG =====
function renderShipSVG() {
  const wrap = document.getElementById('ship-svg-wrap');
  const plate = document.getElementById('ship-name-plate');
  if (!state.selectedHull) {
    wrap.innerHTML = '';
    plate.textContent = '— ВЫБЕРИТЕ КОРПУС —';
    return;
  }
  wrap.innerHTML = state.selectedHull.svg;
  plate.textContent = `◈ ${state.selectedHull.nameRu} · ${state.selectedHull.desc}`;
}

// ===== SHOP =====
function renderShop() {
  const body = document.getElementById('shop-body');
  const cats = [
    { key: 'HIGH', label: 'HIGH SLOT — ОРУЖИЕ', color: 'tag-high' },
    { key: 'MID',  label: 'MID SLOT — ЭЛЕКТРОНИКА', color: 'tag-mid' },
    { key: 'LOW',  label: 'LOW SLOT — БРОНЯ / ДВИЖКИ', color: 'tag-low' },
    { key: 'CIV',  label: 'CIVILIAN — БЫТ / НАУКА', color: 'tag-civ' },
  ];
  body.innerHTML = cats.map(cat => {
    const mods = MODULES.filter(m => m.cat === cat.key);
    return `
      <div class="category-sep">${cat.label}</div>
      ${mods.map(m => {
        const owned = state.ownedModules.includes(m.id);
        const cantAfford = !owned && state.babki < m.cost;
        return `
        <div class="part-card ${owned ? 'owned' : ''} ${cantAfford ? 'cant-afford' : ''}" 
             onclick="buyModule('${m.id}')" title="${m.desc}">
          <div class="part-header">
            <div class="part-name">${m.icon} ${m.name}</div>
            <div class="part-slot-tag ${cat.color}">${cat.key}</div>
          </div>
          <div class="part-desc">${m.desc}</div>
          <div class="part-footer">
            ${owned
              ? `<div class="owned-badge">✓ В АНГАРЕ</div>`
              : `<div class="part-cost">💰 ${m.cost.toLocaleString()}</div>`
            }
            ${m.cpu > 0 || m.pg > 0 ? `
            <div class="part-stats-mini">
              ${m.cpu > 0 ? `<span class="pstat cpu">CPU ${m.cpu}</span>` : ''}
              ${m.pg > 0 ? `<span class="pstat pg">PG ${m.pg}</span>` : ''}
            </div>` : ''}
          </div>
        </div>`;
      }).join('')}
    `;
  }).join('');
}

function buyModule(id) {
  if (state.ownedModules.includes(id)) {
    showNotif('Модуль уже куплен — установи его на корабль!', 'info');
    return;
  }
  const mod = MODULES.find(m => m.id === id);
  if (!mod) return;
  if (state.babki < mod.cost) {
    showNotif('Не хватает Бабок! Иди зарабатывать 💰', 'error');
    return;
  }
  state.babki -= mod.cost;
  state.ownedModules.push(id);
  updateBabki();
  renderShop();
  showNotif(`${mod.icon} ${mod.name} — куплено!`, 'success');
}

// ===== SLOTS =====
function renderSlots() {
  const body = document.getElementById('slots-body');
  if (!state.selectedHull) {
    body.innerHTML = '<div style="padding:20px;text-align:center;color:var(--dim);font-size:11px;letter-spacing:1px;">ВЫБЕРИТЕ КОРПУС</div>';
    return;
  }
  const h = state.selectedHull;

  // CPU/PG usage
  let cpuUsed = 0, pgUsed = 0;
  Object.values(state.installedModules).forEach(mid => {
    const m = MODULES.find(x => x.id === mid);
    if (m) { cpuUsed += m.cpu; pgUsed += m.pg; }
  });
  const cpuPct = Math.min(100, (cpuUsed / h.cpu) * 100);
  const pgPct = Math.min(100, (pgUsed / h.pg) * 100);

  const groups = [
    { key: 'high', label: 'HIGH SLOTS', cls: 'high', count: h.slots.high, tag: 'tag-high', filledCls: 'filled-high', iconCls: 'filled-high-icon', cat: 'HIGH' },
    { key: 'mid',  label: 'MID SLOTS',  cls: 'mid',  count: h.slots.mid,  tag: 'tag-mid',  filledCls: 'filled-mid',  iconCls: 'filled-mid-icon',  cat: 'MID' },
    { key: 'low',  label: 'LOW SLOTS',  cls: 'low',  count: h.slots.low,  tag: 'tag-low',  filledCls: 'filled-low',  iconCls: 'filled-low-icon',  cat: 'LOW' },
    { key: 'civ',  label: 'CIVILIAN',   cls: 'civ',  count: h.slots.civ,  tag: 'tag-civ',  filledCls: 'filled-civ',  iconCls: 'filled-civ-icon',  cat: 'CIV' },
  ];

  body.innerHTML = `
    <div class="resource-meters">
      <div class="res-row">
        <div class="res-label">CPU</div>
        <div class="res-track"><div class="res-fill cpu ${cpuPct > 90 ? 'warning' : ''}" style="width:${cpuPct}%"></div></div>
        <div class="res-val">${cpuUsed} / ${h.cpu}</div>
      </div>
      <div class="res-row">
        <div class="res-label">PG</div>
        <div class="res-track"><div class="res-fill pg ${pgPct > 90 ? 'warning' : ''}" style="width:${pgPct}%"></div></div>
        <div class="res-val">${pgUsed} / ${h.pg}</div>
      </div>
    </div>
    ${groups.map(g => `
      <div class="slot-group-lbl ${g.cls}">${g.label} <span style="color:var(--dim);font-size:9px;">${g.count} СЛОТА</span></div>
      ${Array.from({length: g.count}, (_, i) => {
        const slotId = `${g.key}_${i}`;
        const mid = state.installedModules[slotId];
        const mod = mid ? MODULES.find(m => m.id === mid) : null;
        return `
          <div class="slot ${mod ? g.filledCls : ''}" onclick="clickSlot('${slotId}', '${g.cat}')">
            <div class="slot-icon ${mod ? g.iconCls : 'empty'}">${mod ? mod.icon : '+'}</div>
            <div class="slot-info">
              <div class="slot-name">${mod ? mod.name : `— пусто —`}</div>
              <div class="slot-sublabel">${mod ? `CPU ${mod.cpu} · PG ${mod.pg}` : `${g.label} · СЛОТ ${i+1}`}</div>
            </div>
            ${mod ? `<div class="slot-remove-btn" onclick="event.stopPropagation();removeModule('${slotId}')">✕</div>` : ''}
          </div>`;
      }).join('')}
    `).join('')}
  `;
}

function clickSlot(slotId, cat) {
  if (!state.selectedHull) return;
  const occupied = state.installedModules[slotId];
  if (occupied) return; // click remove button instead

  // Show modules available for this slot type
  const compatible = MODULES.filter(m =>
    m.cat === cat &&
    state.ownedModules.includes(m.id) &&
    m.compat.includes(state.selectedHull.id) &&
    !Object.values(state.installedModules).includes(m.id) // not already installed
  );

  if (compatible.length === 0) {
    showNotif('Нет доступных модулей. Купи в магазине!', 'info');
    return;
  }

  state.pendingSlot = slotId;
  openSlotModal(cat, compatible);
}

function removeModule(slotId) {
  const mid = state.installedModules[slotId];
  if (!mid) return;
  const mod = MODULES.find(m => m.id === mid);
  delete state.installedModules[slotId];
  renderSlots();
  recalcStats();
  if (mod) showNotif(`${mod.name} — снят`, 'info');
}

// ===== SLOT MODAL =====
function openSlotModal(cat, mods) {
  const catNames = { HIGH: 'HIGH SLOT — ОРУЖИЕ', MID: 'MID SLOT — ЭЛЕКТРОНИКА', LOW: 'LOW SLOT — БРОНЯ/ДВИЖКИ', CIV: 'CIVILIAN МОДУЛЬ' };
  document.getElementById('slot-modal-title').textContent = catNames[cat] || 'МОДУЛЬ';
  const list = document.getElementById('slot-select-list');
  list.innerHTML = mods.map(m => `
    <div class="slot-select-item" onclick="installModule('${m.id}')">
      <div class="ssi-icon">${m.icon}</div>
      <div class="ssi-info">
        <div class="ssi-name">${m.name}</div>
        <div class="ssi-reason">${m.desc} ${m.cpu > 0 ? `· CPU ${m.cpu} · PG ${m.pg}` : ''}</div>
      </div>
      <div class="ssi-arrow">→</div>
    </div>
  `).join('');
  document.getElementById('slot-modal').style.display = 'flex';
}

function closeSlotModal() {
  document.getElementById('slot-modal').style.display = 'none';
  state.pendingSlot = null;
}

function installModule(modId) {
  if (!state.pendingSlot) return;
  const mod = MODULES.find(m => m.id === modId);
  if (!mod) return;

  // Check CPU/PG
  const h = state.selectedHull;
  let cpuUsed = 0, pgUsed = 0;
  Object.values(state.installedModules).forEach(mid => {
    const m = MODULES.find(x => x.id === mid);
    if (m) { cpuUsed += m.cpu; pgUsed += m.pg; }
  });
  if (cpuUsed + mod.cpu > h.cpu) { showNotif('Недостаточно CPU!', 'error'); return; }
  if (pgUsed + mod.pg > h.pg) { showNotif('Недостаточно Powergrid!', 'error'); return; }

  state.installedModules[state.pendingSlot] = modId;
  closeSlotModal();
  renderSlots();
  recalcStats();
  showNotif(`${mod.icon} ${mod.name} — установлен!`, 'success');
}

// ===== STATS =====
function recalcStats() {
  if (!state.selectedHull) return;
  const base = state.selectedHull.baseStats;
  let s = { ...base };
  Object.values(state.installedModules).forEach(mid => {
    const m = MODULES.find(x => x.id === mid);
    if (!m) return;
    Object.entries(m.stats).forEach(([k, v]) => { s[k] = (s[k] || 0) + v; });
  });

  const MAX = { dps:200, shield:200, armor:200, speed:100, morale:100, range:150 };
  const set = (id, val, max, suffix='') => {
    document.getElementById(`stat-${id}`).style.width = Math.min(100, (val/max)*100) + '%';
    document.getElementById(`stat-${id}-val`).textContent = val + suffix;
  };
  set('dps', s.dps, MAX.dps);
  set('shield', s.shield, MAX.shield);
  set('armor', s.armor, MAX.armor);
  set('speed', s.speed, MAX.speed);
  set('morale', s.morale, MAX.morale);
  set('range', s.range, MAX.range, ' AU');
}

// ===== QUIZ =====
function openQuiz() {
  state.quizAnswered = false;
  const q = QUIZ_QUESTIONS[state.quizIdx];
  document.getElementById('quiz-cat').textContent = `◈ ${q.cat}`;
  document.getElementById('quiz-q').textContent = q.q;
  document.getElementById('quiz-reward-val').textContent = `${q.reward} 💰`;
  document.getElementById('quiz-result').className = 'quiz-result';

  const opts = document.getElementById('quiz-options');
  const letters = ['A','B','C','D'];
  opts.innerHTML = q.opts.map((o, i) => `
    <div class="quiz-opt" onclick="answerQuiz(${i})">
      <span class="opt-letter">${letters[i]}</span>
      <span>${o}</span>
    </div>
  `).join('');

  document.getElementById('quiz-modal').style.display = 'flex';
}

function answerQuiz(idx) {
  if (state.quizAnswered) return;
  state.quizAnswered = true;
  const q = QUIZ_QUESTIONS[state.quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((o, i) => {
    o.classList.add('disabled');
    if (i === q.ans) o.classList.add('correct');
    else if (i === idx && idx !== q.ans) o.classList.add('wrong');
  });

  const res = document.getElementById('quiz-result');
  const resText = document.getElementById('quiz-result-text');
  if (idx === q.ans) {
    state.babki += q.reward;
    updateBabki(true);
    res.className = 'quiz-result show win';
    resText.textContent = `✓ ВЕРНО! +${q.reward} БАБОК`;
  } else {
    res.className = 'quiz-result show lose';
    resText.textContent = `✗ НЕВЕРНО. Правильный: ${['A','B','C','D'][q.ans]}`;
  }
}

function nextQuestion() {
  state.quizIdx = Math.floor(Math.random() * QUIZ_QUESTIONS.length);
  openQuiz();
}

function closeQuiz() {
  document.getElementById('quiz-modal').style.display = 'none';
}

// ===== UTILS =====
function updateBabki(pop = false) {
  const el = document.getElementById('babki');
  el.textContent = state.babki.toLocaleString();
  if (pop) {
    el.classList.remove('pop');
    void el.offsetWidth;
    el.classList.add('pop');
    renderShop(); // refresh cant-afford states
  }
}

function showNotif(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `notif ${type}`;
  el.innerHTML = `<span>${type === 'success' ? '✓' : type === 'error' ? '✗' : 'ℹ'}</span><span>${msg}</span>`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ===== START =====
init();
</script>
</body>
</html>
